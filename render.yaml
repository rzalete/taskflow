databases:
  - name: taskflow-db
    databaseName: taskflow
    user: taskflow
    plan: free
    region: oregon

services:
  # --- FastAPI backend (native Python runtime, no Docker) ---
  - type: web
    name: taskflow-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install .
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.14.5"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false   # you'll set this to the web URL in Step 5

  # --- React SPA (static site on Render's CDN) ---
  - type: web
    name: taskflow-web
    runtime: static
    rootDir: frontend
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    staticPublishPath: dist
    envVars:
      - key: COREPACK_ENABLE_DOWNLOAD_PROMPT
        value: "0"
      - key: NODE_VERSION
        value: "22.12.0"
      - key: VITE_API_BASE_URL
        sync: false   # you'll set this to the API URL in Step 5
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
