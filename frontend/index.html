<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <script>
    // Anti-FOUC: apply the persisted/preferred theme before first paint.
    // Keep the storage key in sync with THEME_STORAGE_KEY in theme-context.ts.
    ;(function () {
      try {
        var stored = localStorage.getItem("taskflow-theme")
        var theme =
          stored === "light" || stored === "dark" || stored === "system"
            ? stored
            : "system"
        var dark =
          theme === "dark" ||
          (theme === "system" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches)
        var root = document.documentElement
        root.classList.toggle("dark", dark)
        root.style.colorScheme = dark ? "dark" : "light"
      } catch (e) {
        /* localStorage/matchMedia may be unavailable; fall back to light. */
      }
    })()
  </script>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
